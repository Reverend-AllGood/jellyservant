version: "3.9"

# ── JellyServant 1.6 — default compose (HTTP, no built-in proxy) ──────────────
#
# This is the standard setup. JellyServant listens on port 5000.
# Put it behind whatever reverse proxy you already use:
#   • Nginx Proxy Manager  → proxy to host:5000
#   • Traefik              → see docker-compose.traefik.yml
#   • Caddy (standalone)   → see docker-compose.https.yml
#   • Cloudflare Tunnel    → point the tunnel at host:5000, no ports needed
#   • Nothing (LAN only)   → access via http://<host-ip>:5000

services:
  jellyservant:
    build: .
    ports:
      - "5000:5000"
    volumes:
      - ./config:/config      # persists schedules, server config, sync log, known_ids
      - ./output:/output      # where .strm and .nfo files are written
    environment:
      - OUTPUT_DIR=/output
      - CONFIG_FILE=/config/config.json
    restart: unless-stopped
